<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="description" content="One launcher for many CRUD list apps on Meta Ray-Ban Display + mobile.">
<meta name="mrbd-web-app-capable" content="yes">
<title>Meta Glass</title>
<script>
/* Layout before first paint: square ~600px (or #glass) -> glasses additive layout; else responsive. */
(function(){var qs=(location.search+" "+location.hash).toLowerCase();
 var w=innerWidth||0,h=innerHeight||0,sq=w>=520&&w<=680&&Math.abs(w-h)<90;
 var glass=/glass/.test(qs)||(!/\b(web|mobile)\b/.test(qs)&&sq);
 var vp=document.createElement("meta");vp.name="viewport";
 vp.content=glass?"width=600, height=600, initial-scale=1.0, user-scalable=no":"width=device-width, initial-scale=1.0, viewport-fit=cover";
 document.head.appendChild(vp);document.documentElement.className=glass?"glass":"web";})();
</script>
<style>
 /* Visual language ported from GlassKit UI (glasskit.app/ui, MIT): layered translucent
    surfaces + 1px white edges, gradient icon plates, #4c8dff focus glow, caps-tracked
    dim labels, sub-200ms ease-out motion. Verified against Meta's real HUD look —
    premium app-UI surfaces beat literal see-through minimalism, and bright ink on the
    waveguide stays readable because dark pixels still render near-transparent. */
 *{box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif}button,input{font:inherit}
 :root{--ink:#fff;--ink2:#9aa3b5;--ink3:#7c8498;--acc:#4c8dff;--edge:rgba(255,255,255,.10);
   --surf:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.028));
   --ease:cubic-bezier(.23,1,.32,1)}
 .tile,.row{background:var(--surf);border:1px solid var(--edge);
   box-shadow:0 14px 30px -18px rgba(0,0,0,.85);
   transition:box-shadow .16s var(--ease),border-color .16s var(--ease),transform .14s var(--ease)}
 .plate{display:flex;align-items:center;justify-content:center;flex:0 0 auto;
   background:linear-gradient(150deg,var(--g1,#5b9dff),var(--g2,#2f5fe0));
   box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 8px 18px -10px rgba(0,0,0,.9)}
 @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
 html.glass,html.glass body{margin:0;width:600px;height:600px;overflow:hidden;
   background:radial-gradient(120% 90% at 50% -10%,#0e1220 0%,#0b0e16 45%,#090b11 100%)}
 html.glass :focus,html.glass :focus-visible{outline:none}
 html.glass #app{width:600px;height:600px;color:var(--ink);padding:20px 24px;position:relative}
 html.glass .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
 html.glass .tile{padding:16px 14px 14px;border-radius:22px;text-align:center}
 html.glass .tile.focus{border-color:var(--tacc,var(--acc));
   box-shadow:0 0 0 2px var(--tacc,var(--acc)),0 0 28px -6px var(--tacc,var(--acc)),0 14px 30px -18px rgba(0,0,0,.85)}
 html.glass .plate{width:62px;height:62px;border-radius:18px;font-size:33px;margin:0 auto}
 html.glass .tile .tname{margin-top:9px;font-size:21px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 html.glass .row{position:relative;overflow:hidden;display:flex;gap:12px;align-items:center;padding:12px 16px;border-radius:19px}
 html.glass .row.focus{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc),0 0 24px -6px var(--acc),0 14px 30px -18px rgba(0,0,0,.85)}
 html.glass .big{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums}
 html.glass .t{font-size:22px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 html.glass .done .t{text-decoration:line-through;color:var(--ink2)}
 /* Focused-row ticker (device finding 2026-07-11): long titles glide left and back so
    the whole line is readable hands-free. Only the focused row moves (no jitter). */
 html.glass .mq{display:inline-block;will-change:transform}
 html.glass .row.focus .t{text-overflow:clip}
 html.glass .row.focus .mq.go{animation:gcmarq var(--mqd,7s) ease-in-out infinite}
 @keyframes gcmarq{0%,14%{transform:translateX(0)}46%,58%{transform:translateX(var(--mq,0px))}90%,100%{transform:translateX(0)}}
 /* Glass detail scrolls (image + summary + actions can exceed 600px) */
 html.glass #screen{max-height:502px;overflow-y:auto;overflow-x:hidden}
 html.glass .dimg{max-height:280px;object-fit:cover}
 html.glass .foot{position:absolute;left:24px;bottom:14px;font-size:12px;color:var(--ink3);
   text-transform:uppercase;letter-spacing:.08em}
 html.web,html.web body{margin:0;color:#e6edf3;
   background:radial-gradient(120% 70% at 50% -10%,#0e1220 0%,#0b0e16 45%,#090b11 100%) fixed}
 html.web #app{max-width:640px;margin:0 auto;padding:0 16px 28px}
 html.web .head{position:sticky;top:0;background:rgba(10,12,18,.88);backdrop-filter:blur(10px);
   padding:12px 0;border-bottom:1px solid var(--edge);display:flex;gap:8px;align-items:center;justify-content:space-between}
 html.web .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:12px}
 html.web .tile{padding:18px 14px 16px;border-radius:20px;cursor:pointer;text-align:center}
 html.web .tile:hover,html.web .tile.focus{border-color:var(--tacc,var(--acc));transform:translateY(-2px);
   box-shadow:0 0 0 1px var(--tacc,var(--acc)),0 14px 34px -14px var(--tacc,var(--acc))}
 html.web .tile:active{transform:scale(.97)}
 html.web .plate{width:52px;height:52px;border-radius:15px;font-size:27px;margin:0 auto}
 html.web .tile .tname{margin-top:9px;font-size:14px;font-weight:600;color:#e6edf3}
 html.web .row{display:flex;gap:10px;align-items:center;padding:12px 14px;border-radius:16px;margin:8px 0}
 html.web .row.done .t{text-decoration:line-through;color:var(--ink2)}
 html.web .big{font-size:22px;font-weight:800;min-width:52px;text-align:right;font-variant-numeric:tabular-nums}
 html.web .t{font-size:16px;flex:1}
 @keyframes gcblink{0%,100%{opacity:1}50%{opacity:0}} .row.over .big{color:#ff4d4f;animation:gcblink 1s steps(1,end) infinite}
 html.web .iconbtn{border:1px solid var(--edge);background:rgba(255,255,255,.06);color:#e6edf3;border-radius:10px;padding:6px 10px;cursor:pointer;transition:border-color .16s var(--ease)}
 html.web .iconbtn:active{transform:scale(.97)}
 html.web .iconbtn.on{color:#ffd66b;border-color:#ffd66b}
 html.web input{background:rgba(255,255,255,.05);color:#e6edf3;border:1px solid var(--edge);border-radius:12px;padding:9px 11px;width:100%;margin:6px 0}
 html.web input:focus{outline:none;border-color:var(--acc)}
 html.web .addbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
 html.web .primary{background:var(--acc);border:0;color:#fff;border-radius:12px;padding:10px 16px;cursor:pointer;font-weight:600}
 html.web .primary:active{transform:scale(.97)}
 html.web .dropzone{border:1px dashed var(--edge);border-radius:12px;padding:12px;text-align:center;color:var(--ink2);font-size:12px;cursor:pointer;margin:6px 0}
 html.web .dropzone.over{border-color:var(--acc);color:#e6edf3;background:rgba(76,141,255,.08)}
 html.web .imgprev{max-height:120px;max-width:100%;border-radius:12px;margin:4px 0;display:none}
 .muted{color:var(--ink2);font-size:12px}#status{font-size:12px}
 /* Gesture hint rides in the top-right status slot on glass — must be readable there. */
 html.glass #status{font-size:15px;color:#9ecbff;white-space:nowrap}
</style>
</head>
<body>
<div id="app">
  <div class="head"><span style="display:flex;gap:8px;align-items:center"><button id="backbtn" class="iconbtn" style="display:none">‹ Apps</button><b id="title">Meta Glass</b></span><span id="status" class="muted"></span></div>
  <!-- Never a blank surface: visible before the first registry fetch resolves (slow networks). -->
  <div id="screen"><div style="text-align:center;margin-top:110px;font-size:24px;line-height:1.55"><div style="font-size:54px">✨</div><b style="color:#fff">Loading…</b></div></div>
  <div class="foot" id="foot"></div>
</div>
<script>
"use strict";
/* SINGLE-SOURCE LAUNCHER: this file is the only one you edit. tools/sync_public.py
   generates worker/public/index.html from it by flipping PROD to true — the Worker-served
   copy is same-origin (no API URL to type, /apps/ registry path, password-only setup). */
var PROD=false;
var GLASS=document.documentElement.className==="glass";
var API="",TOKEN="",REG={apps:[]},MODE="launcher",focus=0,view="list";
var CFG=null,CFGPATH="",COLL="",QKEY="",CKEY="",items=[],DACTS=[],dfocus=0,refreshTimer=null,tickTimer=null,rotTimer=null;

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function setStatus(t){document.getElementById("status").textContent=t;}
function setFoot(t){document.getElementById("foot").textContent=t;}

/* ---- global credentials (set ONCE for all apps) ---- */
function readCreds(){
  var p=new URLSearchParams((location.hash.replace(/^#/,"&")+"&"+location.search.replace(/^\?/,"")).replace(/^&/,""));
  var a=p.get("api"), t=p.get("t")||p.get("token");
  if(a){ API=a; save("gc_api",a); }
  if(t){ TOKEN=t; save("gc_token",t); }
  if(!API) API=load("gc_api","")||"";
  if(!TOKEN) TOKEN=load("gc_token","")||"";
  if(PROD&&!API){ API=location.origin+"/api"; save("gc_api",API); }   // served by the same Worker
}

/* ================= SETUP ================= */
function screenSetup(){
  MODE="setup"; document.getElementById("title").textContent="Setup";
  var s=document.getElementById("screen");
  if(GLASS){ s.innerHTML=PROD
      ?'<div style="font-size:22px;line-height:1.5">One-time setup.<br>Register this URL with your password in the hash:<br><span class="muted">#glass&t=YOUR_PASSWORD</span></div>'
      :'<div style="font-size:22px;line-height:1.5">One-time setup.<br>Open this launcher on your phone,<br>or register the URL with your API + password in the hash:<br><span class="muted">#api=YOUR_WORKER_URL/api&t=YOUR_PASSWORD</span></div>';
    return; }
  s.innerHTML=(PROD
      ?'<p class="muted">One-time: enter your password (the app password you set on deploy). The API URL is this site.</p>'
      :'<p class="muted">One-time setup — used by every app.</p>'
       +'<input id="s_api" placeholder="Worker API URL, e.g. https://glass-crud-api.xxx.workers.dev/api" value="'+esc(API)+'">')
    +'<input id="s_tok" type="password" placeholder="Password (the app password you set on deploy)" value="'+esc(TOKEN)+'">'
    +'<button class="primary" id="s_save">Save & continue</button>'
    +'<p class="muted" style="margin-top:14px">📷 Add to glasses in one tap: run <code>python tools/qr.py "Meta Glass" "'
    +(PROD?esc(location.origin):"https://YOUR-WORKER.workers.dev")+'/#glass&t=YOUR_PASSWORD"</code> and scan the QR with your phone.</p>';
  document.getElementById("s_save").onclick=function(){
    var ai=document.getElementById("s_api");
    if(ai){ API=ai.value.trim().replace(/\/$/,""); save("gc_api",API); }
    TOKEN=document.getElementById("s_tok").value.trim();
    save("gc_token",TOKEN); openLauncher();
  };
}

/* ================= LAUNCHER ================= */
function stopRefresh(){ if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null;} }
function startRefresh(){ stopRefresh(); var s=CFG&&+CFG.refresh; if(s>=3)refreshTimer=setInterval(function(){ if(MODE==="app")refresh(); }, s*1000); }
var regTimer=null;
async function fetchReg(tries){
  for(var i=0;i<(tries||1);i++){
    try{ var r=await (await fetch(PROD?"/apps/registry.json":"../apps/registry.json",{cache:"no-store"})).json();
      if(r&&r.apps){ REG=r; if(r.apps.length) return true; } }catch(e){}
    if(i+1<(tries||1)) await new Promise(function(ok){setTimeout(ok,1000);});
  }
  return !!REG.apps.length;
}
async function openLauncher(){
  stopRefresh(); stopTick(); stopRotate(); stopInspire();
  MODE="launcher"; view="list"; focus=0; CFG=null;
  document.getElementById("title").textContent="Apps";
  if((!PROD&&!API)||!TOKEN){ return screenSetup(); }
  if(!REG.apps.length) await fetchReg(1);
  renderLauncher();
}
/* Icon-plate gradients (GlassKit palettes, ~150°). A config `accent` overrides both
   gradient stops; otherwise apps cycle the six pairs by launcher position. */
var PALETTES=[["#5b9dff","#2f5fe0"],["#3fe0a3","#11a36f"],["#ff7eb3","#ff8a5b"],
              ["#b08bff","#7C3AED"],["#36d6ee","#0e8fc7"],["#ffd66b","#f5a623"]];
function palFor(a,i){return (a&&a.accent)?[a.accent,a.accent]:PALETTES[i%PALETTES.length];}
function renderLauncher(){
  updateBack(); setStatus("");
  var n=REG.apps.length||0, pages=Math.ceil(n/6)||1, page=Math.floor(focus/6);
  document.getElementById("foot").innerHTML=n+' apps'+(GLASS&&pages>1?' · '+(page+1)+'/'+pages:'')+' · <a href="#" data-settings style="color:#4aa3ff;text-decoration:none">⚙ settings</a>';
  var s=document.getElementById("screen");
  if(!REG.apps.length){
    /* Registry unreachable or empty — say so brightly and keep retrying (no reload on glasses). */
    s.innerHTML='<div style="text-align:center;margin-top:'+(GLASS?"110px":"40px")+';font-size:'+(GLASS?"26px":"16px")+';line-height:1.55"><div style="font-size:'+(GLASS?"54px":"40px")+'">📡</div><b>No apps loaded yet.</b><br><span style="color:#9ecbff">Checking the connection — retrying…</span></div>';
    clearTimeout(regTimer);
    regTimer=setTimeout(function(){ if(MODE==="launcher"&&!REG.apps.length) openLauncher(); },8000);
    return;
  }
  /* Glasses page the grid by 6 (2×3 always fits 600px); phone/desktop scroll instead. */
  var start=GLASS?page*6:0, slice=GLASS?REG.apps.slice(start,start+6):REG.apps;
  s.innerHTML='<div class="grid">'+slice.map(function(a,j){
    var i=start+j, p=palFor(a,i);
    return '<div class="tile'+(i===focus?" focus":"")+'" data-i="'+i+'" style="--tacc:'+p[0]+';--g1:'+p[0]+';--g2:'+p[1]+'"><div class="plate">'+esc(a.icon||"▦")+'</div><div class="tname">'+esc(a.name)+'</div></div>';
  }).join("")+'</div>';
}

/* ================= APP RUNNER ================= */
async function openApp(idx){
  var a=REG.apps[idx]; if(!a) return;
  CFGPATH=a.config; CFG=await (await fetch(a.config,{cache:"no-store"})).json();
  // Page app (its own HTML endpoint, e.g. the timer control): on phone/desktop open it directly,
  // carrying creds so it's zero-setup. On the glasses fall through to the read-only display.
  if(!GLASS && CFG.control){ location.href=controlURL()+"#api="+encodeURIComponent(API)+"&t="+encodeURIComponent(TOKEN); return; }
  // Fullscreen apps (stencil, wallpaper) are the consuming surface itself: on the glasses,
  // skip the list and land straight in the fullscreen view (newest item); ↑↓ browse from there.
  MODE="app"; focus=0; dfocus=0; view=(GLASS&&CFG.fullscreen)?"detail":"list";
  COLL=CFG.collection; QKEY="gc_queue_"+COLL; CKEY="gc_cache_"+COLL;
  document.getElementById("title").textContent=CFG.title||a.name;
  buildAddBar();
  items=load(CKEY,[]); applySort(); render(); refresh(); startRefresh(); startTick(); startRotate();
  try{ history.pushState(null,""); }catch(e){}
}
function apiBase(){ return API||CFG.api||""; }
async function api(method,path,body){
  try{var r=await fetch(apiBase()+path,{method:method,headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN},body:body?JSON.stringify(body):undefined});
    if(!r.ok)throw 0;return await r.json();}catch(e){return null;}
}
function queuePush(m){var q=load(QKEY,[]);q.push(m);save(QKEY,q);}
async function flushQueue(){var q=load(QKEY,[]);if(!q.length)return;var left=[];for(const m of q){if(await api(m.method,m.path,m.body)===null)left.push(m);}save(QKEY,left);}
function audioPlaying(){var a=document.querySelector("#screen audio");return !!(a&&!a.paused&&!a.ended);}
async function refresh(){await flushQueue();var res=await api("GET","/"+COLL);
  if(res&&res.items){items=res.items;save(CKEY,items);setStatus("online");}else{items=load(CKEY,[]);setStatus("offline");}
  if(focus>=items.length)focus=0;applySort();
  /* Don't rebuild the DOM (which destroys a playing <audio>) while the user is listening. */
  if(!audioPlaying())render();}
function applySort(){var s=(CFG&&CFG.sort)||{key:"created",dir:"desc"};items.sort(function(a,b){var x=a[s.key],y=b[s.key];if(x==null)return 1;if(y==null)return -1;var c=typeof x==="number"?x-y:String(x).localeCompare(String(y));return s.dir==="desc"?-c:c;});}
function mut(id,p){var it=items.find(i=>i.id===id);if(it)Object.assign(it,p);save(CKEY,items);}
async function doPatch(id,p){mut(id,p);if(await api("PATCH","/"+COLL+"/"+id,p)===null)queuePush({method:"PATCH",path:"/"+COLL+"/"+id,body:p});render();}
async function doDelete(id){items=items.filter(i=>i.id!==id);save(CKEY,items);if(await api("DELETE","/"+COLL+"/"+id)===null)queuePush({method:"DELETE",path:"/"+COLL+"/"+id});if(focus>=items.length)focus=Math.max(0,items.length-1);render();}
async function doAdd(f){var tmp=Object.assign({id:"tmp_"+Date.now(),seen:false,fav:false,created:new Date().toISOString()},f);items.unshift(tmp);save(CKEY,items);applySort();render();var res=await api("POST","/"+COLL,f);if(res&&res.id)tmp.id=res.id,save(CKEY,items);else queuePush({method:"POST",path:"/"+COLL,body:f});}
function rt(it){return it[CFG.row.title];}function rb(it){return CFG.row.badge?it[CFG.row.badge]:"";}
/* Live countdown field. Value = absolute deadline (epoch ms) while running, or the NEGATIVE of
   the frozen remaining ms while paused/ready. The glasses tick it locally every second and only
   re-sync via `refresh` to pick up pause/reset/adjust — so a missed fetch never freezes the clock
   (and there's no drift: the deadline is fixed). row.amber (field key, seconds) sets the wrap-up. */
function cdMs(v){v=+v||0;return v>1e11?v-Date.now():-v;}
function cdFmt(ms){var neg=ms<0,t=Math.round(Math.abs(ms)/1000),m=Math.floor(t/60),s=t%60;return (neg?"-":"")+m+":"+(s<10?"0":"")+s;}
function cdTime(v){return cdFmt(cdMs(v));}
function cdPhase(v,amber){var ms=cdMs(v);amber=(+amber||0)*1000;return ms<=0?"🔴 OVER":(amber&&ms<=amber?"🟡 Wrap up":"🟢 On pace");}
function isCd(){return !!(CFG&&CFG.row&&fieldType(CFG.row.badge)==="countdown");}
/* Glasses-side control of a countdown: write a new deadline to the DB (the single source of truth,
   shared with the phone control page). pause -> freeze remaining; resume -> run again; reset -> full. */
function cdAction(id,kind){var it=items.find(function(i){return i.id===id;});if(!it)return;
  var k=CFG.row.badge,v=+it[k]||0,run=v>1e11,ms=run?v-Date.now():-v,full=(+it[CFG.row.full]||0)*1000,nv;
  if(kind==="pause")nv=-Math.round(Math.max(0,ms));
  else if(kind==="resume")nv=Date.now()+Math.max(0,ms);
  else nv=full?-full:-Math.round(Math.max(0,ms));
  var p={};p[k]=nv;doPatch(id,p);}
function stopTick(){if(tickTimer){clearInterval(tickTimer);tickTimer=null;}}
/* `rotate`: seconds (config, fullscreen apps) — auto-advance to the next item while the
   fullscreen view is open (a rotating wallpaper/slideshow). Manual ↑/↓ browsing still works. */
function stopRotate(){if(rotTimer){clearInterval(rotTimer);rotTimer=null;}}
function startRotate(){stopRotate();var s=+((CFG||{}).rotate)||0;
  if(CFG&&CFG.fullscreen&&s>=3)rotTimer=setInterval(function(){
    if(MODE==="app"&&view==="detail"&&items.length>1){focus=(focus+1)%items.length;render();}},s*1000);}
function startTick(){stopTick();if(isCd())tickTimer=setInterval(tickCd,1000);}
function tickCd(){if(MODE!=="app"||view!=="list"||!isCd())return;var b=CFG.row.badge,amb=CFG.row.amber,rows=document.querySelectorAll("#screen .row");for(var i=0;i<rows.length;i++){var it=items[+rows[i].getAttribute("data-i")];if(!it)continue;var big=rows[i].querySelector(".big");if(big)big.textContent=cdTime(it[b]);var t=rows[i].querySelector(".t");if(t)t.textContent=cdPhase(it[b],it[amb]);rows[i].classList.toggle("over",cdMs(it[b])<=0);}}
function render(){ if(MODE!=="app")return; updateBack(); view==="detail"?renderDetail():renderList();
  /* Teach the gestures (device findings 2026-07-11): swipe → = next story. The bottom
     footer is hard to see on the real display, so in glass detail the hint lives in the
     TOP-RIGHT status slot (like the online badge) — always in view. */
  var AD=(CFG.actions||{}).delete;
  if(GLASS&&view==="detail"&&AD&&items.length)setStatus((focus+1)+"/"+items.length+" · → next · ↓ read");
  setFoot(view==="detail"&&CFG.fullscreen&&items.length?(focus+1)+"/"+items.length+" · "+(CFG.title||"")+" · [↑↓] switch"
    :view==="detail"&&AD&&items.length?(focus+1)+"/"+items.length+" · → next story · ↓ read · ← back"
    :(CFG.title||"")+" · "+items.length+" · [←] apps"); }
function controlURL(){return CFG.control?CFGPATH.replace(/[^/]+$/,"")+CFG.control:"";}
function renderList(){var A=CFG.actions||{},s=document.getElementById("screen");
  var start=GLASS?Math.floor(focus/5)*5:0,slice=GLASS?items.slice(start,start+5):items,html="";
  if(!GLASS&&A.add)html+=addBarHTML();
  if(!items.length){
    var how=CFG.control?("Set it up on your phone —<br>open "+esc(CFG.title||"this app")+" from the launcher there."):(A.add?(GLASS?"Add items on your phone or desktop —<br>they appear here to use hands-free.":"Add your first item above ⬆"):"This display is fed from your PC —<br>tools/push.py fills it.");
    html+='<div style="text-align:center;margin-top:'+(GLASS?"110px":"40px")+';font-size:'+(GLASS?"26px":"16px")+';line-height:1.55"><div style="font-size:'+(GLASS?"54px":"40px")+'">✨</div><b>Nothing here yet.</b><br><span style="color:'+(GLASS?"#9ecbff":"#8aa0b8")+'">'+how+"</span></div>";
    s.innerHTML=html; if(!GLASS&&A.add)wireAddBar(); return;}
  for(var i=0;i<slice.length;i++){var g=start+i,it=slice[i];
    var cd=isCd(),bigv=cd?cdTime(it[CFG.row.badge]):rb(it),titv=cd?cdPhase(it[CFG.row.badge],it[CFG.row.amber]):rt(it),over=cd&&cdMs(it[CFG.row.badge])<=0;
    html+='<div class="row'+(g===focus?" focus":"")+(it.seen?" done":"")+(over?" over":"")+'" data-i="'+g+'">'
      +((bigv!==""&&bigv!=null)?'<div class="big">'+esc(bigv)+'</div>':'')
      +((!cd&&fieldType(CFG.row.title)==="image")?'<img src="'+esc(rt(it))+'" alt="" style="height:'+(GLASS?64:44)+'px;max-width:'+(GLASS?128:96)+'px;object-fit:cover;border-radius:6px">':'<div class="t"><span class="mq">'+esc(titv)+'</span></div>');
    if(!GLASS){if(A.check)html+='<button class="iconbtn'+(it.seen?" on":"")+'" data-act="check" data-id="'+esc(it.id)+'">✓</button>';
      if(A.fav)html+='<button class="iconbtn'+(it.fav?" on":"")+'" data-act="fav" data-id="'+esc(it.id)+'">★</button>';
      if(A.delete)html+='<button class="iconbtn" data-act="del" data-id="'+esc(it.id)+'">🗑</button>';}
    html+='</div>';}
  s.innerHTML=html; if(!GLASS&&A.add)wireAddBar(); stopInspire(); wireMarquee();
}
/* Measure the focused row's overflow and start the back-and-forth ticker if it clips. */
function wireMarquee(){ if(!GLASS)return;
  var t=document.querySelector(".row.focus .t"),m=t&&t.querySelector(".mq"); if(!t||!m)return;
  var ov=m.scrollWidth-t.clientWidth;
  if(ov>8){ m.style.setProperty("--mq",(-(ov+10))+"px");
    m.style.setProperty("--mqd",Math.max(6,Math.round(ov/30))+"s"); m.classList.add("go"); }
}
function openURL(u){try{var w=window.open(u,"_blank","noopener");if(!w)location.href=u;}catch(e){location.href=u;}}
function toggleAudio(id){var a=document.getElementById(id);if(!a)return;if(a.paused){a.play();}else{a.pause();}}
/* Inspire overlay: while an audio program plays, show the app's OWN bundled `audioImages`
   full-bleed in the FOREGROUND, rotating — an immersive inspiring moment. Tap to pause, ← exits. */
var inspTimer=null,inspImgs=null,inspIdx=0;
function stopInspire(){if(inspTimer){clearInterval(inspTimer);inspTimer=null;}
  var o=document.getElementById("gcinspire");if(o)o.remove();}
function startInspire(){var imgs=CFG&&CFG.audioImages;if(!imgs||!imgs.length)return;stopInspire();
  var o=document.createElement("div");o.id="gcinspire";
  o.style.cssText="position:fixed;inset:0;z-index:40;background:#000;cursor:pointer;overflow:hidden";
  var img=document.createElement("img");
  img.style.cssText="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.4s ease";
  o.appendChild(img);
  var bar=document.createElement("div");
  bar.style.cssText="position:absolute;top:0;left:0;right:0;padding:12px 16px;font-size:15px;color:#fff;text-shadow:0 1px 4px #000;background:linear-gradient(#0009,transparent)";
  bar.textContent="‹ Back  ·  tap image = play/pause";
  bar.style.cursor="pointer";
  bar.onclick=function(e){e.stopPropagation();stopInspire();view="list";render();};
  o.appendChild(bar);
  o.onclick=function(){var a=document.querySelector("#screen audio");if(a){a.paused?a.play():a.pause();}};
  document.body.appendChild(o);
  inspImgs=imgs.slice();inspIdx=0;
  function show(){img.style.opacity="0";setTimeout(function(){
    img.src=inspImgs[inspIdx%inspImgs.length];img.style.opacity="1";},300);inspIdx++;}
  show();inspTimer=setInterval(show,12000);}
/* Show inspiring images as soon as an audio item's detail opens — NOT gated on the audio
   'play' event (playback is device-limited on the glasses). Audio is best-effort. */
function wireInspire(){var au=document.querySelector("#screen audio");
  if(au&&CFG&&CFG.audioImages&&CFG.audioImages.length){
    startInspire();
    try{var pr=au.play();if(pr&&pr.catch)pr.catch(function(){});}catch(e){}}}
function detailActions(it){var A=CFG.actions||{},acts=[];
  (CFG.fields||[]).forEach(function(f){if((f.type==="link"||f.type==="video")&&it[f.key])acts.push({label:"▶ Open "+(f.label||f.key),run:function(){openURL(it[f.key]);}});});
  (CFG.fields||[]).forEach(function(f){if(f.type==="audio"&&it[f.key])acts.push({label:"🔊 Play / pause "+(f.label||f.key),run:function(){toggleAudio("au_"+f.key);}});});
  if(CFG.row&&fieldType(CFG.row.badge)==="countdown"){var v=+it[CFG.row.badge]||0,run=v>1e11,ms=run?v-Date.now():-v;
    if(run)acts.push({label:"⏸ Pause",run:function(){cdAction(it.id,"pause");}});
    else if(ms>0)acts.push({label:"▶ Resume",run:function(){cdAction(it.id,"resume");}});
    acts.push({label:"↺ Reset",run:function(){cdAction(it.id,"reset");}});}
  if(A.check)acts.push({label:it.seen?"✓ Uncheck":"✓ Check off",run:function(){act(it.id,"check");}});
  if(A.fav)acts.push({label:it.fav?"★ Unfavorite":"★ Favorite",run:function(){act(it.id,"fav");}});
  /* Gesture-independent dismiss (device finding 2026-07-11: the band's right-swipe
     doesn't reliably reach the page as ArrowRight) — Enter on this always works. */
  if(A.delete)acts.push({label:"✕ Dismiss — next story",run:function(){
    doDelete(it.id); dfocus=0; if(!items.length)view="list"; render();}});
  return acts;}
function renderFullscreen(it,A){var f=(CFG.fields||[]).find(function(x){return x.type==="image";}),url=f?it[f.key]:"";
  DACTS=detailActions(it);var ov="";
  if(GLASS){DACTS.forEach(function(a,i){ov+='<span class="row'+(i===dfocus?" focus":"")+'" style="padding:6px 12px;margin:0 4px">'+esc(a.label)+'</span>';});}
  else{if(A.fav)ov+='<button class="iconbtn" data-act="fav" data-id="'+esc(it.id)+'">★</button> ';if(A.delete)ov+='<button class="iconbtn" data-act="del" data-id="'+esc(it.id)+'">🗑</button>';}
  document.getElementById("screen").innerHTML=
    '<div style="position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden">'
    +(url?'<img src="'+esc(url)+'" alt="" style="width:100%;height:100%;object-fit:contain">':'<div style="text-align:center;font-size:26px;line-height:1.55"><div style="font-size:54px">✨</div><b>Nothing here yet.</b><br><span style="color:#9ecbff">Send one from your phone —<br>open '+esc(CFG.title||"this app")+' from the launcher there.</span></div>')
    +'</div>'
    +(GLASS?'':'<div style="position:absolute;left:12px;top:12px;z-index:2"><button class="iconbtn" data-nav="applist">‹ back</button></div>')
    +(ov?'<div style="position:absolute;left:0;right:0;bottom:12px;z-index:2;text-align:center">'+ov+'</div>':'');}
function renderDetail(){var it=items[focus]||{},A=CFG.actions||{};
  if(CFG.fullscreen)return renderFullscreen(it,A);
  var html='<button class="iconbtn" data-nav="applist">‹ back</button><div style="margin-top:10px">';
  (CFG.detail||[]).forEach(function(k){var v=it[k],ty=fieldType(k),disp=esc(v);
    if(ty==="countdown")disp=esc(cdTime(v));
    else if(ty==="geo"&&v)disp='<a href="https://maps.google.com/?q='+encodeURIComponent(v)+'" target="_blank" style="color:#8ab4f8">'+esc(v)+'</a>';
    else if((ty==="link"||ty==="video")&&v)disp='<a href="'+esc(v)+'" target="_blank" style="color:#8ab4f8">▶ Open</a>';
    else if(ty==="audio"&&v)disp='<audio id="au_'+esc(k)+'" controls preload="none" src="'+esc(v)+'" style="width:100%;display:block"></audio>';
    else if(ty==="image"&&v)disp='<img class="dimg" src="'+esc(v)+'" alt="" style="width:100%;border-radius:10px;display:block" loading="lazy">';
    html+='<div class="muted">'+esc(k)+'</div><div style="font-size:20px;margin-bottom:8px;white-space:pre-line">'+disp+'</div>';});
  DACTS=detailActions(it);
  if(GLASS){if(dfocus>=DACTS.length)dfocus=0;
    DACTS.forEach(function(a,i){html+='<div class="row'+(i===dfocus?" focus":"")+'" style="margin:8px 0">'+esc(a.label)+'</div>';});
  }else{if(A.check)html+='<button class="primary" data-act="check" data-id="'+esc(it.id)+'">'+(it.seen?"Uncheck":"Check off")+'</button> ';
    if(A.fav)html+='<button class="iconbtn" data-act="fav" data-id="'+esc(it.id)+'">★ fav</button> ';
    if(A.delete)html+='<button class="iconbtn" data-act="del" data-id="'+esc(it.id)+'">🗑 delete</button>';}
  document.getElementById("screen").innerHTML=html+'</div>';
  wireInspire();
  /* Glass detail is scrollable: land at the top when opening, then keep the focused
     action in view while arrowing down (which walks the reader through the text). */
  if(GLASS){ var scr=document.getElementById("screen");
    if(dfocus===0){ scr.scrollTop=0; }
    else{ var fr=scr.querySelector(".row.focus"); if(fr&&fr.scrollIntoView)fr.scrollIntoView({block:"nearest"}); } }
}
var ADD_FIELDS=[];
function buildAddBar(){ADD_FIELDS=(CFG.actions&&CFG.actions.add)?(CFG.fields||[]):[];}
function fieldType(k){var f=(CFG.fields||[]).find(function(x){return x.key===k;});return f?f.type:"text";}
function isFinePointer(){return !!(window.matchMedia&&matchMedia("(pointer:fine)").matches);}
function addBarHTML(){return '<div class="addbar">'+ADD_FIELDS.map(function(f){
  if(f.type==="geo")return '<input id="f_'+f.key+'" placeholder="'+esc(f.label||f.key)+' (lat,lon)" readonly style="width:auto;flex:1"><button class="iconbtn" data-geo="'+f.key+'" title="Use my location">📍</button>';
  if(f.type==="image"){var fine=isFinePointer();
    return '<div style="flex:1;min-width:200px">'
      +'<input id="f_'+f.key+'" placeholder="'+(fine?"Paste an image URL / link":"Paste an image or a link")+'" style="width:100%">'
      +(fine?'<div class="dropzone" id="drop_'+f.key+'">Drag &amp; drop an image here, or paste it</div>':'')
      +'<img class="imgprev" id="prev_'+f.key+'" alt="">'
      +'</div>';}
  return '<input id="f_'+f.key+'" placeholder="'+esc(f.label||f.key)+'"'+(f.type==="number"?' type="number"':'')+(f.default!=null?' value="'+esc(f.default)+'"':'')+' style="width:auto;flex:1">';
}).join("")+'<button class="primary" id="addbtn">Add</button></div>';}
/* Downscale an image File/Blob to a JPEG data URL so it stays small enough for D1. */
function fileToDataURL(file,cb){if(!file||!/^image\//.test(file.type||"")){cb(null);return;}
  var fr=new FileReader();fr.onload=function(){var img=new Image();
    img.onload=function(){var max=1280,w=img.width,h=img.height,sc=Math.min(1,max/Math.max(w,h)),c=document.createElement("canvas");
      c.width=Math.round(w*sc);c.height=Math.round(h*sc);c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      try{cb(c.toDataURL("image/jpeg",0.85));}catch(e){cb(fr.result);}};
    img.onerror=function(){cb(fr.result);};img.src=fr.result;};
  fr.onerror=function(){cb(null);};fr.readAsDataURL(file);}
function wireImageField(key){var inp=document.getElementById("f_"+key),dz=document.getElementById("drop_"+key),pv=document.getElementById("prev_"+key);
  function preview(u){if(!pv)return;if(u){pv.src=u;pv.style.display="block";}else pv.style.display="none";}
  function setVal(u){if(!u)return;inp.value=u;preview(u);}
  if(inp){inp.addEventListener("input",function(){preview(inp.value);});
    inp.addEventListener("paste",function(e){var its=(e.clipboardData||{}).items||[];for(var i=0;i<its.length;i++){if(/^image\//.test(its[i].type)){e.preventDefault();fileToDataURL(its[i].getAsFile(),setVal);return;}}});}
  var zones=[dz,inp];zones.forEach(function(z){if(!z)return;
    ["dragenter","dragover"].forEach(function(ev){z.addEventListener(ev,function(e){e.preventDefault();if(dz)dz.classList.add("over");});});
    ["dragleave","dragend"].forEach(function(ev){z.addEventListener(ev,function(e){if(dz)dz.classList.remove("over");});});
    z.addEventListener("drop",function(e){e.preventDefault();if(dz)dz.classList.remove("over");
      var f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
      if(f)fileToDataURL(f,setVal);else{var u=e.dataTransfer&&e.dataTransfer.getData("text");if(u)setVal(u);}});});}
function captureGeo(key){var el=document.getElementById("f_"+key);if(!el)return;
  if(!navigator.geolocation){setStatus("no geolocation");return;}
  setStatus("locating…");
  navigator.geolocation.getCurrentPosition(function(p){el.value=p.coords.latitude.toFixed(5)+","+p.coords.longitude.toFixed(5);setStatus("located");},
    function(){setStatus("location denied");},{enableHighAccuracy:true,timeout:10000,maximumAge:0});}
function wireAddBar(){ADD_FIELDS.forEach(function(x){if(x.type==="image")wireImageField(x.key);});
  var b=document.getElementById("addbtn");if(!b)return;b.onclick=function(){var f={},ok=false;ADD_FIELDS.forEach(x=>{var el=document.getElementById("f_"+x.key),v=el.value;if(x.type==="number")v=v===""?null:Number(v);if(v!==""&&v!=null)ok=true;f[x.key]=v;});if(ok){doAdd(f);ADD_FIELDS.forEach(x=>{if(x.default==null){document.getElementById("f_"+x.key).value="";var pv=document.getElementById("prev_"+x.key);if(pv)pv.style.display="none";}});}};}
function act(id,a){var it=items.find(i=>i.id===id);if(a==="check")doPatch(id,{seen:!(it&&it.seen)});else if(a==="fav")doPatch(id,{fav:!(it&&it.fav)});else if(a==="del")doDelete(id);}

function updateBack(){var b=document.getElementById("backbtn");if(b)b.style.display=(MODE==="app")?"inline-block":"none";}
function contextBack(){ if(MODE==="app"&&view==="detail"){view="list";render();} else if(MODE==="app"){openLauncher();} }

/* ================= input ================= */
document.getElementById("backbtn").onclick=contextBack;
document.getElementById("app").addEventListener("click",function(e){
  if(e.target.closest("#backbtn"))return;
  var st=e.target.closest("[data-settings]"); if(st){e.preventDefault();screenSetup();return;}
  var geo=e.target.closest("[data-geo]"); if(geo){captureGeo(geo.getAttribute("data-geo"));return;}
  var nav=e.target.closest("[data-nav]"); if(nav){contextBack();return;}
  var b=e.target.closest("[data-act]"); if(b){act(b.getAttribute("data-id"),b.getAttribute("data-act"));return;}
  if(MODE==="launcher"){var t=e.target.closest(".tile");if(t){openApp(+t.getAttribute("data-i"));return;}}
  if(MODE==="app"){var r=e.target.closest(".row");if(r){focus=+r.getAttribute("data-i");view="detail";render();}}
});
document.addEventListener("keydown",function(e){
  if(e.key==="s"&&MODE!=="app"){screenSetup();return;}
  if(MODE==="launcher"){var n=REG.apps.length;if(!n)return;var cols=GLASS?2:1,nf=focus;
    if(e.key==="Enter"){e.preventDefault();openApp(focus);return;}
    else if(e.key==="ArrowRight")nf=focus+1;
    else if(e.key==="ArrowLeft")nf=focus-1;
    else if(e.key==="ArrowDown")nf=focus+cols;
    else if(e.key==="ArrowUp")nf=focus-cols;
    else return;
    e.preventDefault();if(nf<0)nf=0;if(nf>=n)nf=n-1;focus=nf;renderLauncher();return;}
  if(MODE==="app"){var A=CFG&&CFG.actions||{};
    if(view==="detail"){
      if(e.key==="ArrowLeft"){e.preventDefault();view="list";render();return;}
      // Fullscreen apps: ↑↓ switch the displayed item (one stencil/wallpaper at a time, D-pad next/prev).
      if(CFG.fullscreen&&items.length>1){
        if(e.key==="ArrowDown"){e.preventDefault();focus=(focus+1)%items.length;render();return;}
        if(e.key==="ArrowUp"){e.preventDefault();focus=(focus-1+items.length)%items.length;render();return;}
      }
      /* D-pad right = throw the article away, show the next one (device finding
         2026-07-11; needs actions.delete). Back-and-forth safe: ← still exits.
         Gesture mapping on the band proved unreliable, so dismiss ALSO exists as a
         focusable "✕ Dismiss" action (Enter) — see detailActions. */
      if(e.key==="ArrowRight"&&A.delete&&items[focus]){e.preventDefault();
        doDelete(items[focus].id); dfocus=0;
        if(!items.length){view="list";} render(); return;}
      /* ↓ first scrolls THROUGH the story (device finding: focus used to jump straight
         to the bottom actions, cutting off the middle), then cycles the actions. */
      if(e.key==="ArrowDown"){e.preventDefault();var sd=document.getElementById("screen");
        if(GLASS&&dfocus===0&&sd.scrollTop+sd.clientHeight<sd.scrollHeight-8){sd.scrollTop+=300;return;}
        if(DACTS.length){dfocus=(dfocus+1)%DACTS.length;render();}return;}
      if(e.key==="ArrowUp"){e.preventDefault();var su=document.getElementById("screen");
        if(DACTS.length&&dfocus>0){dfocus--;render();return;}
        if(GLASS&&su.scrollTop>0){su.scrollTop-=300;}return;}
      if(e.key==="Enter"){e.preventDefault();if(DACTS[dfocus])DACTS[dfocus].run();return;}
      return;}
    if(e.key==="ArrowLeft"){e.preventDefault();openLauncher();return;}
    /* List-view dismiss too (the user may swipe right on a ROW, not just in detail). */
    if(e.key==="ArrowRight"&&A.delete&&items[focus]){e.preventDefault();act(items[focus].id,"del");return;}
    if(e.key==="ArrowDown"){e.preventDefault();focus=(focus+1)%Math.max(1,items.length);render();return;}
    if(e.key==="ArrowUp"){e.preventDefault();focus=(focus-1+items.length)%Math.max(1,items.length);render();return;}
    if(e.key==="Enter"){e.preventDefault();dfocus=0;view="detail";render();return;}
    if((e.key===" "||e.key==="c")&&items[focus]&&A.check){e.preventDefault();act(items[focus].id,"check");return;}
    if(e.key==="f"&&items[focus]&&A.fav){act(items[focus].id,"fav");return;}
    if((e.key==="Delete"||e.key==="Backspace")&&items[focus]&&A.delete){e.preventDefault();act(items[focus].id,"del");return;}}
});
window.addEventListener("online",function(){if(MODE==="app")refresh();});
window.addEventListener("popstate",function(){ if(MODE==="app"){ contextBack(); if(MODE==="app"){ try{history.pushState(null,"");}catch(e){} } } });

/* ================= boot ================= */
(async function(){
  readCreds();
  var deep=PROD?null:new URLSearchParams(location.search).get("config");
  if((!PROD&&!API)||!TOKEN){ screenSetup(); return; }
  await fetchReg(2);
  if(deep){ REG.apps.unshift({name:"App",icon:"▦",config:deep}); openApp(0); }
  else openLauncher();
})();
</script>

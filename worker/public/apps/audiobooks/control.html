<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Audiobooks</title>
<style>
  :root { --bg:#0b0d10; --panel:#15181d; --panel2:#1b1f26; --line:#262b33; --ink:#e8ecf1;
          --dim:#8b94a1; --acc:#b08bff; --up:#1db954; }
  * { box-sizing:border-box; }
  html,body { margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:16px 16px 110px; }
  .top { display:flex; align-items:center; gap:10px; margin:4px 0 14px; }
  .top a { color:var(--dim); text-decoration:none; font-size:13px; border:1px solid var(--line);
    border-radius:10px; padding:6px 10px; white-space:nowrap; }
  h1 { font-size:15px; font-weight:600; color:var(--dim); margin:0; text-transform:uppercase; flex:1; }
  .status { font-size:12px; color:var(--dim); } .status.ok { color:var(--up); } .status.err { color:#ff4d4f; }

  .bk { background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:12px; margin:12px 0; }
  .bk.playing { border-color:var(--acc); box-shadow:0 0 0 1px var(--acc); }
  .bk-head { display:flex; gap:12px; }
  .cover { width:92px; height:92px; border-radius:12px; object-fit:cover; flex:0 0 auto; background:var(--panel2); }
  .bk .mid { flex:1; min-width:0; }
  .bk .au { font-size:12px; font-weight:700; color:var(--acc); text-transform:uppercase; letter-spacing:.04em; }
  .bk .ti { font-size:16px; font-weight:700; line-height:1.3; margin-top:2px; }
  .bk .meta { font-size:12px; color:var(--dim); margin-top:4px; }
  .bar { height:6px; border-radius:3px; background:var(--panel2); margin-top:8px; overflow:hidden; }
  .bar i { display:block; height:100%; background:var(--acc); }
  .acts { display:flex; flex-direction:column; gap:6px; flex:0 0 auto; }
  .acts button { font:inherit; font-size:14px; border:1px solid var(--line); background:transparent;
    color:var(--dim); border-radius:9px; padding:5px 9px; cursor:pointer; }
  .acts button.play { color:#fff; background:var(--acc); border-color:var(--acc); font-weight:700; }
  .acts button.on { color:#ffd66b; border-color:#ffd66b; }
  .chaps { display:none; margin-top:10px; border-top:1px solid var(--line); padding-top:6px; }
  .bk.open .chaps { display:block; }
  .chap { display:flex; gap:8px; align-items:center; padding:7px 4px; border-radius:8px;
    font-size:14px; cursor:pointer; }
  .chap:hover { background:var(--panel2); }
  .chap.cur { color:var(--acc); font-weight:700; }
  .chap .n { color:var(--dim); font-size:12px; min-width:24px; text-align:right; }
  .about { font-size:13px; color:#c3cad4; line-height:1.5; margin-top:8px; display:none; white-space:pre-line; }
  .bk.open .about { display:block; }

  #playerbar { position:fixed; left:0; right:0; bottom:0; background:rgba(13,16,22,.96);
    backdrop-filter:blur(10px); border-top:1px solid var(--line);
    padding:10px 14px calc(10px + env(safe-area-inset-bottom)); display:none; }
  #playerbar.on { display:block; }
  .pb-row { max-width:640px; margin:0 auto; display:flex; align-items:center; gap:10px; }
  #pb-title { flex:1; min-width:0; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #pb-toggle { font:inherit; font-size:18px; width:44px; height:44px; border-radius:50%; border:0;
    background:var(--acc); color:#fff; cursor:pointer; flex:0 0 auto; }
  #pb-seek { flex:2; accent-color:var(--acc); min-width:80px; }
  #pb-time { font-size:11px; color:var(--dim); font-variant-numeric:tabular-nums; white-space:nowrap; }
  .empty { text-align:center; padding:60px 20px; }
  .empty .big { font-size:44px; } .empty b { display:block; font-size:18px; margin:10px 0 6px; }
  .empty p { color:var(--dim); font-size:14px; line-height:1.6; margin:0; }
  .empty code { background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:2px 6px; }
  fieldset { border:1px solid var(--line); border-radius:14px; margin:14px 0 0; padding:12px 14px 16px; }
  legend { color:var(--dim); font-size:12px; text-transform:uppercase; padding:0 6px; }
  input { width:100%; font:inherit; font-size:16px; padding:11px 12px; border-radius:11px;
    border:1px solid var(--line); background:#0f1216; color:var(--ink); }
  label { display:block; font-size:13px; color:var(--dim); margin:10px 0 5px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a href="/">‹ Apps</a>
    <h1>📚 Audiobooks</h1>
    <span id="status" class="status">loading…</span>
  </div>
  <div id="feed"></div>
  <fieldset id="backend" hidden>
    <legend>Backend (once)</legend>
    <label for="api">Worker URL</label>
    <input id="api" placeholder="https://your-worker.workers.dev" autocomplete="off">
    <label for="tok">App password</label>
    <input id="tok" type="password" placeholder="your API_SECRET" autocomplete="off">
  </fieldset>
</div>

<div id="playerbar">
  <div class="pb-row">
    <button id="pb-toggle">▶</button>
    <span id="pb-title"></span>
    <input id="pb-seek" type="range" min="0" max="100" value="0">
    <span id="pb-time">0:00</span>
  </div>
</div>
<audio id="player" preload="none"></audio>

<script>
"use strict";
var COLLECTION="audiobooks";
var $=function(id){return document.getElementById(id);};
var ls={get:function(k,d){try{var v=localStorage.getItem("ab_"+k);return v==null?d:v;}catch(e){return d;}},
        set:function(k,v){try{localStorage.setItem("ab_"+k,v);}catch(e){}}};
(function(){try{
  var p=new URLSearchParams((location.hash.replace(/^#/,"&")+"&"+location.search.replace(/^\?/,"")).replace(/^&/,""));
  var a=p.get("api"), t=p.get("t")||p.get("token");
  if(a) ls.set("api",a.replace(/\/+$/,"").replace(/\/api$/,""));
  if(t) ls.set("tok",t);
}catch(e){}})();
function apiBase(){return (ls.get("api",($("api")||{}).value||"")||"").trim().replace(/\/+$/,"");}
function token(){return (ls.get("tok",($("tok")||{}).value||"")||"").trim();}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function setStatus(cls,t){var el=$("status");el.className="status "+(cls||"");el.textContent=t;}
function fmt(s){s=Math.max(0,Math.round(s||0));var m=Math.floor(s/60);return m+":"+("0"+s%60).slice(-2);}
function chapsOf(it){try{return JSON.parse(it.chapters||"[]");}catch(e){return[];}}
function curIdx(it){var cs=chapsOf(it);for(var i=0;i<cs.length;i++)if(cs[i].u===it.audio)return i;return 0;}

var items=[],cur=null,posTimer=null;
var player=$("player");

async function fetchItems(){
  var base=apiBase(),tok=token();
  if(!base||!tok){$("backend").hidden=false;setStatus("err","set backend below");renderEmpty();return;}
  try{
    var r=await fetch(base+"/api/"+COLLECTION,{headers:{Authorization:"Bearer "+token()}});
    if(!r.ok)throw 0;
    items=(await r.json()).items||[];
    setStatus("ok","live");
  }catch(e){setStatus("err","offline");}
  render();
}
async function patch(id,p){
  try{await fetch(apiBase()+"/api/"+COLLECTION+"/"+id,{method:"PATCH",
    headers:{"Content-Type":"application/json",Authorization:"Bearer "+token()},body:JSON.stringify(p)});
  }catch(e){}
}

/* ---- resume-centric player: pos saves every 15s; chapter auto-advance PATCHes the book ---- */
function savePos(){ if(!cur)return; var p=Math.floor(player.currentTime||0);
  if(p>5){cur.pos=p;patch(cur.id,{pos:p});} }
function startPosTimer(){stopPosTimer();posTimer=setInterval(savePos,15000);}
function stopPosTimer(){if(posTimer){clearInterval(posTimer);posTimer=null;}}
function playBook(it,chapIdx,fromPos){
  var cs=chapsOf(it); if(!cs.length)return;
  var idx=(chapIdx==null)?curIdx(it):chapIdx;
  var resume=(fromPos==null)?((idx===curIdx(it))?(+it.pos||0):0):fromPos;
  if(cur&&cur.id===it.id&&idx===curIdx(it)&&player.src===cs[idx].u){
    player.paused?player.play():player.pause(); return;
  }
  savePos();
  cur=it;
  var upd={audio:cs[idx].u,chapter:cs[idx].t,progress:(idx+1)+"/"+cs.length,pos:resume};
  Object.assign(it,upd); patch(it.id,upd);
  player.src=cs[idx].u;
  player.play().then(function(){ if(resume>10)player.currentTime=resume; }).catch(function(){});
  $("playerbar").classList.add("on");
  $("pb-title").textContent=it.title+" — "+cs[idx].t;
  startPosTimer(); render();
}
player.addEventListener("pause",function(){$("pb-toggle").textContent="▶";savePos();render();});
player.addEventListener("play",function(){$("pb-toggle").textContent="⏸";render();});
player.addEventListener("timeupdate",function(){
  if(!player.duration)return;
  $("pb-seek").value=Math.round(100*player.currentTime/player.duration);
  $("pb-time").textContent=fmt(player.currentTime)+" / "+fmt(player.duration);
});
player.addEventListener("ended",function(){
  if(!cur)return;
  var cs=chapsOf(cur),idx=curIdx(cur);
  if(idx+1<cs.length){ playBook(cur,idx+1,0); }
  else { patch(cur.id,{seen:true,pos:0}); cur.seen=true; render(); }
});
$("pb-toggle").onclick=function(){player.paused?player.play():player.pause();};
$("pb-seek").oninput=function(){ if(player.duration)player.currentTime=player.duration*this.value/100; };

function bkHTML(it){
  var cs=chapsOf(it),idx=curIdx(it),pct=cs.length?Math.round(100*idx/cs.length):0;
  var playing=cur&&cur.id===it.id&&!player.paused;
  return '<div class="bk'+(cur&&cur.id===it.id?" playing":"")+'" data-open="'+esc(it.id)+'">'
    +'<div class="bk-head">'
    +(it.cover?'<img class="cover" src="'+esc(it.cover)+'" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'">':'<div class="cover"></div>')
    +'<div class="mid"><div class="au">'+esc(it.author)+'</div>'
    +'<div class="ti">'+esc(it.title)+'</div>'
    +'<div class="meta">'+esc(it.progress)+' · '+esc(it.chapter)
    +((+it.pos||0)>10?' · resumes at '+fmt(it.pos):'')+(it.total?' · '+esc(it.total)+' total':'')+'</div>'
    +'<div class="bar"><i style="width:'+pct+'%"></i></div></div>'
    +'<span class="acts">'
    +'<button class="play" data-playbk="'+esc(it.id)+'">'+(playing?"⏸":"▶")+'</button>'
    +'<button data-fav="'+esc(it.id)+'" class="'+(it.fav?"on":"")+'">★</button>'
    +'<button data-dismiss="'+esc(it.id)+'" title="Remove">✕</button></span></div>'
    +'<div class="about">'+esc(it.about)+'</div>'
    +'<div class="chaps">'+cs.map(function(c,i){
      return '<div class="chap'+(i===idx?" cur":"")+'" data-chap="'+esc(it.id)+':'+i+'">'
        +'<span class="n">'+(i+1)+'</span><span>'+esc(c.t)+'</span></div>';
    }).join("")+'</div></div>';
}
function render(){
  var f=$("feed");
  if(!items.length){renderEmpty();return;}
  f.innerHTML=items.slice().sort(function(a,b){return(+a.rank||0)-(+b.rank||0);}).map(bkHTML).join("");
}
function renderEmpty(){
  $("feed").innerHTML='<div class="empty"><div class="big">📚</div><b>No books yet.</b>'
    +'<p>This library is filled by your Claude pipeline.<br>Ask Claude to add books '
    +'(WhatsApp works), or run <code>python tools/book_pipeline.py --push</code> on your PC.</p></div>';
}
document.body.addEventListener("click",function(e){
  var pb=e.target.closest("[data-playbk]");
  if(pb){var it=items.find(function(x){return x.id===pb.getAttribute("data-playbk");});if(it)playBook(it);return;}
  var ch=e.target.closest("[data-chap]");
  if(ch){var p=ch.getAttribute("data-chap").split(":"),i2=items.find(function(x){return x.id===p[0];});
    if(i2)playBook(i2,+p[1],0);return;}
  var fv=e.target.closest("[data-fav]");
  if(fv){var i3=items.find(function(x){return x.id===fv.getAttribute("data-fav");});
    if(i3){i3.fav=!i3.fav;patch(i3.id,{fav:i3.fav});render();}return;}
  var d=e.target.closest("[data-dismiss]");
  if(d){var i4=items.find(function(x){return x.id===d.getAttribute("data-dismiss");});
    if(i4){items=items.filter(function(x){return x.id!==i4.id;});
      try{fetch(apiBase()+"/api/"+COLLECTION+"/"+i4.id,{method:"DELETE",
        headers:{Authorization:"Bearer "+token()}});}catch(e2){} render();}return;}
  var o=e.target.closest("[data-open]");
  if(o&&!e.target.closest(".chaps"))o.classList.toggle("open");
});
window.addEventListener("beforeunload",savePos);
["api","tok"].forEach(function(id){$(id).value=ls.get(id,"");$(id).addEventListener("input",function(){ls.set(id,$(id).value);});});
fetchItems(); setInterval(fetchItems,60000);
</script>
</body>
</html>

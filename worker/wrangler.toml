name = "glass-crud-api"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Serve the frontend (launcher + app configs) from this same Worker — no GitHub Pages needed.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# D1 (serverless SQLite). Your real database_id lives in the git-ignored push.env
# (D1_DATABASE_ID=…) — `python tools/deploy.py` injects it here only while deploying and
# restores this placeholder right after, so no personal id is ever committed.
[[d1_databases]]
binding = "DB"
database_name = "glass_crud"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# NOTE: the API secret is NOT stored in this file. Set it as an encrypted secret:
#   npx wrangler secret put API_SECRET

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Podcasts</title>
<style>
  :root { --bg:#0b0d10; --panel:#15181d; --panel2:#1b1f26; --line:#262b33; --ink:#e8ecf1;
          --dim:#8b94a1; --acc:#4c8dff; --up:#1db954; }
  * { box-sizing:border-box; }
  html,body { margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:16px 16px 110px; }
  .top { display:flex; align-items:center; gap:10px; margin:4px 0 14px; }
  .top a { color:var(--dim); text-decoration:none; font-size:13px; border:1px solid var(--line);
    border-radius:10px; padding:6px 10px; white-space:nowrap; }
  h1 { font-size:15px; font-weight:600; letter-spacing:.02em; color:var(--dim); margin:0;
    text-transform:uppercase; flex:1; }
  .status { font-size:12px; color:var(--dim); } .status.ok { color:var(--up); } .status.err { color:#ff4d4f; }
  .sechead { display:flex; align-items:baseline; gap:8px; margin:20px 0 10px; }
  .sechead b { font-size:18px; } .sechead .bar { width:22px; height:5px; border-radius:3px; background:var(--acc); }
  .sechead .n { color:var(--dim); font-size:12px; }

  .ep { display:flex; gap:12px; background:var(--panel); border:1px solid var(--line);
    border-radius:16px; padding:12px; margin:10px 0; }
  .ep.playing { border-color:var(--acc); box-shadow:0 0 0 1px var(--acc); }
  .ep.read { opacity:.55; }
  .art { width:76px; height:76px; border-radius:12px; object-fit:cover; flex:0 0 auto; background:var(--panel2); }
  .ep .mid { flex:1; min-width:0; }
  .ep .showname { font-size:12px; font-weight:700; color:var(--acc); text-transform:uppercase;
    letter-spacing:.04em; }
  .ep .ti { font-size:15px; font-weight:600; line-height:1.35; margin-top:2px; }
  .ep .meta { font-size:12px; color:var(--dim); margin-top:4px; }
  .ep .notes { font-size:13px; color:#c3cad4; line-height:1.5; margin-top:8px; display:none; white-space:pre-line; }
  .ep.open .notes { display:block; }
  .acts { display:flex; flex-direction:column; gap:6px; flex:0 0 auto; }
  .acts button { font:inherit; font-size:14px; border:1px solid var(--line); background:transparent;
    color:var(--dim); border-radius:9px; padding:5px 9px; cursor:pointer; }
  .acts button.play { color:#fff; background:var(--acc); border-color:var(--acc); font-weight:700; }
  .acts button.on { color:#ffd66b; border-color:#ffd66b; }

  /* persistent bottom player — survives all list re-renders (audio element lives outside) */
  #playerbar { position:fixed; left:0; right:0; bottom:0; background:rgba(13,16,22,.96);
    backdrop-filter:blur(10px); border-top:1px solid var(--line); padding:10px 14px
    calc(10px + env(safe-area-inset-bottom)); display:none; }
  #playerbar.on { display:block; }
  .pb-row { max-width:640px; margin:0 auto; display:flex; align-items:center; gap:10px; }
  #pb-title { flex:1; min-width:0; font-size:13px; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; }
  #pb-toggle { font:inherit; font-size:18px; width:44px; height:44px; border-radius:50%;
    border:0; background:var(--acc); color:#fff; cursor:pointer; flex:0 0 auto; }
  #pb-seek { flex:2; accent-color:var(--acc); min-width:80px; }
  #pb-time { font-size:11px; color:var(--dim); font-variant-numeric:tabular-nums; white-space:nowrap; }
  .empty { text-align:center; padding:60px 20px; }
  .empty .big { font-size:44px; } .empty b { display:block; font-size:18px; margin:10px 0 6px; }
  .empty p { color:var(--dim); font-size:14px; line-height:1.6; margin:0; }
  .empty code { background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:2px 6px; }
  fieldset { border:1px solid var(--line); border-radius:14px; margin:14px 0 0; padding:12px 14px 16px; }
  legend { color:var(--dim); font-size:12px; text-transform:uppercase; padding:0 6px; }
  input { width:100%; font:inherit; font-size:16px; padding:11px 12px; border-radius:11px;
    border:1px solid var(--line); background:#0f1216; color:var(--ink); }
  label { display:block; font-size:13px; color:var(--dim); margin:10px 0 5px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a href="/">‹ Apps</a>
    <h1>🎙️ Podcasts</h1>
    <span id="status" class="status">loading…</span>
  </div>
  <div style="display:flex;gap:8px;margin:2px 0 4px">
    <input id="q" placeholder="Filter episodes — or search all podcasts" autocomplete="off" style="margin:0">
    <button id="qgo" style="font:inherit;border:0;border-radius:11px;background:var(--acc);color:#fff;padding:0 16px;cursor:pointer;flex:0 0 auto">Search</button>
  </div>
  <div id="results"></div>
  <div id="feed"></div>
  <fieldset id="backend" hidden>
    <legend>Backend (once)</legend>
    <label for="api">Worker URL</label>
    <input id="api" placeholder="https://your-worker.workers.dev" autocomplete="off">
    <label for="tok">App password</label>
    <input id="tok" type="password" placeholder="your API_SECRET" autocomplete="off">
  </fieldset>
</div>

<div id="playerbar">
  <div class="pb-row">
    <button id="pb-toggle">▶</button>
    <span id="pb-title"></span>
    <input id="pb-seek" type="range" min="0" max="100" value="0">
    <span id="pb-time">0:00</span>
  </div>
</div>
<audio id="player" preload="none"></audio>

<script>
"use strict";
var COLLECTION="podcasts";
var $=function(id){return document.getElementById(id);};
var ls={get:function(k,d){try{var v=localStorage.getItem("pc_"+k);return v==null?d:v;}catch(e){return d;}},
        set:function(k,v){try{localStorage.setItem("pc_"+k,v);}catch(e){}}};
(function(){try{
  var p=new URLSearchParams((location.hash.replace(/^#/,"&")+"&"+location.search.replace(/^\?/,"")).replace(/^&/,""));
  var a=p.get("api"), t=p.get("t")||p.get("token");
  if(a) ls.set("api",a.replace(/\/+$/,"").replace(/\/api$/,""));
  if(t) ls.set("tok",t);
}catch(e){}})();
function apiBase(){return (ls.get("api",($("api")||{}).value||"")||"").trim().replace(/\/+$/,"");}
function token(){return (ls.get("tok",($("tok")||{}).value||"")||"").trim();}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function setStatus(cls,t){var el=$("status");el.className="status "+(cls||"");el.textContent=t;}
function fmt(s){s=Math.max(0,Math.round(s||0));var m=Math.floor(s/60);return m+":"+("0"+s%60).slice(-2);}

var items=[],cur=null,posTimer=null;
var player=$("player");

async function fetchItems(){
  var base=apiBase(),tok=token();
  if(!base||!tok){$("backend").hidden=false;setStatus("err","set backend below");renderEmpty();return;}
  try{
    var r=await fetch(base+"/api/"+COLLECTION,{headers:{Authorization:"Bearer "+token()}});
    if(!r.ok)throw 0;
    items=(await r.json()).items||[];
    setStatus("ok","live");
  }catch(e){setStatus("err","offline");}
  render();
}
async function patch(id,p){
  try{await fetch(apiBase()+"/api/"+COLLECTION+"/"+id,{method:"PATCH",
    headers:{"Content-Type":"application/json",Authorization:"Bearer "+token()},body:JSON.stringify(p)});
  }catch(e){}
}

/* ---- persistent player + remembered positions (PATCH pos every ~15s + on pause) ---- */
function savePos(){ if(!cur)return; var p=Math.floor(player.currentTime||0);
  if(p>5){cur.pos=p;patch(cur.id,{pos:p});} }
function startPosTimer(){stopPosTimer();posTimer=setInterval(savePos,15000);}
function stopPosTimer(){if(posTimer){clearInterval(posTimer);posTimer=null;}}
function playEp(it){
  if(cur&&cur.id===it.id){ player.paused?player.play():player.pause(); return; }
  savePos();
  cur=it; player.src=it.audio;
  var resume=+it.pos||0;
  player.currentTime=0;
  player.play().then(function(){ if(resume>10){player.currentTime=resume;} }).catch(function(){});
  $("playerbar").classList.add("on");
  $("pb-title").textContent=it.show+" — "+it.title;
  patch(it.id,{seen:true}); it.seen=true;
  startPosTimer(); render();
}
player.addEventListener("pause",function(){$("pb-toggle").textContent="▶";savePos();render();});
player.addEventListener("play",function(){$("pb-toggle").textContent="⏸";render();});
player.addEventListener("timeupdate",function(){
  if(!player.duration)return;
  $("pb-seek").value=Math.round(100*player.currentTime/player.duration);
  $("pb-time").textContent=fmt(player.currentTime)+" / "+fmt(player.duration);
});
player.addEventListener("ended",function(){ if(cur){cur.pos=0;patch(cur.id,{pos:0});} savePos=savePos; });
$("pb-toggle").onclick=function(){player.paused?player.play():player.pause();};
$("pb-seek").oninput=function(){ if(player.duration)player.currentTime=player.duration*this.value/100; };

function epHTML(it){
  var playing=cur&&cur.id===it.id&&!player.paused;
  return '<div class="ep'+(it.seen?" read":"")+(cur&&cur.id===it.id?" playing":"")
    +'" data-open="'+esc(it.id)+'">'
    +(it.image?'<img class="art" src="'+esc(it.image)+'" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'">':'<div class="art"></div>')
    +'<div class="mid"><div class="showname">'+esc(it.show)+'</div>'
    +'<div class="ti">'+esc(it.title)+'</div>'
    +'<div class="meta">'+esc([it.duration,it.published].filter(Boolean).join(" · "))
    +((+it.pos||0)>10?' · resumes at '+fmt(it.pos):'')+'</div>'
    +'<div class="notes">'+esc(it.notes)+'</div></div>'
    +'<span class="acts">'
    +'<button class="play" data-play="'+esc(it.id)+'">'+(playing?"⏸":"▶")+'</button>'
    +'<button data-fav="'+esc(it.id)+'" class="'+(it.fav?"on":"")+'">★</button>'
    +'<button data-dismiss="'+esc(it.id)+'" title="Dismiss">✕</button></span></div>';
}
function render(){
  var f=$("feed");
  if(!items.length){renderEmpty();return;}
  var secs={},order=[];
  items.slice().sort(function(a,b){return(+a.rank||0)-(+b.rank||0);}).filter(matches).forEach(function(it){
    var s=it.section||"Episodes";
    if(!secs[s]){secs[s]=[];order.push(s);}
    secs[s].push(it);
  });
  f.innerHTML=order.map(function(s){
    return '<div class="sechead"><span class="bar"></span><b>'+esc(s)+'</b><span class="n">'
      +secs[s].length+'</span></div>'+secs[s].map(epHTML).join("");
  }).join("");
}
function renderEmpty(){
  $("feed").innerHTML='<div class="empty"><div class="big">🎙️</div><b>No episodes yet.</b>'
    +'<p>This feed is filled by your Claude pipeline.<br>Ask Claude to add shows (WhatsApp works), '
    +'or run <code>python tools/podcast_pipeline.py --push</code> on your PC.</p></div>';
}
document.body.addEventListener("click",function(e){
  var fw=e.target.closest("[data-follow]");
  if(fw){fw.textContent="✓ Following";fw.disabled=true;follow(fw.getAttribute("data-follow"));return;}
  var b=e.target.closest("[data-play]");
  if(b){var it=items.find(function(x){return x.id===b.getAttribute("data-play");});if(it)playEp(it);return;}
  var fv=e.target.closest("[data-fav]");
  if(fv){var i2=items.find(function(x){return x.id===fv.getAttribute("data-fav");});
    if(i2){i2.fav=!i2.fav;patch(i2.id,{fav:i2.fav});render();}return;}
  var d=e.target.closest("[data-dismiss]");
  if(d){var i3=items.find(function(x){return x.id===d.getAttribute("data-dismiss");});
    if(i3){items=items.filter(function(x){return x.id!==i3.id;});
      try{fetch(apiBase()+"/api/"+COLLECTION+"/"+i3.id,{method:"DELETE",
        headers:{Authorization:"Bearer "+token()}});}catch(e2){} render();}return;}
  var o=e.target.closest("[data-open]");
  if(o){o.classList.toggle("open");}
});
/* ---- search: instant episode filter + directory search-and-follow ----
   Typing filters loaded episodes live. "Search" queries the open directory (iTunes
   Search via JSONP — the endpoint has no CORS but supports callback=). Follow writes
   the show into the PRIVATE profile row (the `profile` collection is just data behind
   the same password); episodes arrive with the next pipeline run. */
var FILTER="";
$("q").addEventListener("input",function(){ FILTER=this.value.trim().toLowerCase();
  $("results").innerHTML=""; render(); });
function matches(it){ if(!FILTER)return true;
  return (it.show+" "+it.title+" "+(it.notes||"")).toLowerCase().indexOf(FILTER)>=0; }
function jsonp(url){ return new Promise(function(res,rej){
  var cb="_pc_cb"+Date.now(); window[cb]=function(d){res(d);delete window[cb];s.remove();};
  var s=document.createElement("script");
  s.src=url+"&callback="+cb; s.onerror=function(){rej();s.remove();};
  document.body.appendChild(s); setTimeout(function(){rej&&rej();},8000); }); }
async function dirSearch(){
  var q=$("q").value.trim(); if(!q)return;
  $("results").innerHTML='<div class="empty" style="padding:14px"><p>Searching the directory…</p></div>';
  try{
    var d=await jsonp("https://itunes.apple.com/search?media=podcast&limit=6&term="+encodeURIComponent(q));
    var rs=(d.results||[]);
    if(!rs.length){$("results").innerHTML='<div class="empty" style="padding:14px"><p>No shows found for "'+esc(q)+'".</p></div>';return;}
    $("results").innerHTML=rs.map(function(r){
      return '<div class="ep"><img class="art" src="'+esc(r.artworkUrl100||"")+'" alt="">'
        +'<div class="mid"><div class="showname">'+esc(r.artistName||"")+'</div>'
        +'<div class="ti">'+esc(r.collectionName||"")+'</div>'
        +'<div class="meta">'+esc(r.primaryGenreName||"")+' · '+(r.trackCount||"?")+' episodes</div></div>'
        +'<span class="acts"><button class="play" data-follow="'+esc(r.collectionName||"")+'">＋ Follow</button></span></div>';
    }).join("");
  }catch(e){$("results").innerHTML='<div class="empty" style="padding:14px"><p>Directory search unreachable right now.</p></div>';}
}
$("qgo").onclick=dirSearch;
$("q").addEventListener("keydown",function(e){if(e.key==="Enter")dirSearch();});
async function follow(name){
  try{
    var r=await fetch(apiBase()+"/api/profile",{headers:{Authorization:"Bearer "+token()}});
    var rows=(await r.json()).items||[];
    var row=rows.find(function(x){return x.id==="podcasts";})||{id:"podcasts",shows:[]};
    row.shows=row.shows||[];
    if(row.shows.indexOf(name)<0)row.shows.push(name);
    await fetch(apiBase()+"/api/profile/bulk",{method:"POST",
      headers:{"Content-Type":"application/json",Authorization:"Bearer "+token()},
      body:JSON.stringify({items:[row]})});
    setStatus("ok","following: "+name+" — episodes arrive with the next update");
  }catch(e){setStatus("err","could not update the profile");}
}
window.addEventListener("beforeunload",savePos);
["api","tok"].forEach(function(id){$(id).value=ls.get(id,"");$(id).addEventListener("input",function(){ls.set(id,$(id).value);});});
fetchItems(); setInterval(fetchItems,60000);
</script>
</body>
</html>
